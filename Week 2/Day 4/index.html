<!DOCTYPE html>
<html>

<head>

    <title>HTML Forms</title>

</head>

<body>

    <h1>Contact Me</h1>

    <p>

        This webpage demonstrates different HTML form elements.

    </p>

    <hr>

    <form>

        <label for="fullname">Full Name:</label>

        <br>

        <input type="text"
               id="fullname"
               name="fullname"
               placeholder="Enter your full name">

        <br><br>

        <label for="email">Email Address:</label>

        <br>

        <input type="email"
               id="email"
               name="email"
               placeholder="example@email.com">

        <br><br>

        <label for="password">Password:</label>

        <br>

        <input type="password"
               id="password"
               name="password"
               placeholder="Enter your password">

        <br><br>

        <label>Gender:</label>

        <br>

        <input type="radio"
               id="female"
               name="gender">

        <label for="female">Female</label>

        <br>

        <input type="radio"
               id="male"
               name="gender">

        <label for="male">Male</label>

        <br><br>

        <label>Skills:</label>

        <br>

        <input type="checkbox"
               id="html"
               name="skills">

        <label for="html">HTML</label>

        <br>

        <input type="checkbox"
               id="css"
               name="skills">

        <label for="css">CSS</label>

        <br>

        <input type="checkbox"
               id="javascript"
               name="skills">

        <label for="javascript">JavaScript</label>

        <br>

        <input type="checkbox"
               id="git"
               name="skills">

        <label for="git">Git & GitHub</label>

        <br><br>

        <label for="city">City:</label>

        <br>

        <select id="city"
                name="city">

            <option>Lahore</option>

            <option>Islamabad</option>

            <option>Karachi</option>

            <option>Multan</option>

            <option>Faisalabad</option>

        </select>

        <br><br>

        <label for="message">Message:</label>

        <br>

        <textarea id="message"
                  name="message"
                  rows="6"
                  cols="40"
                  placeholder="Write your message here..."></textarea>

        <br><br>

        <button type="submit">

            Submit

        </button>

        <button type="reset">

            Reset

        </button>

    </form>

</body>

</html>
