<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🌤 Weather App</h1>

        <input
            type="text"
            id="cityInput"
            placeholder="Enter city name">

        <button id="searchBtn">

            Search

        </button>

        <div id="weatherResult">

            <h2 id="cityName">

                City Name

            </h2>

            <p id="temperature">

                Temperature

            </p>

            <p id="condition">

                Weather Condition

            </p>

            <p id="humidity">

                Humidity

            </p>

            <p id="wind">

                Wind Speed

            </p>

        </div>

    </div>

<script src="script.js"></script>

</body>

</html>
