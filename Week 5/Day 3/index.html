<!DOCTYPE html>
<html>

<head>

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Live Weather App</h1>

        <input
            type="text"
            id="cityInput"
            placeholder="Enter City Name">

        <button id="searchBtn">

            Get Weather

        </button>

        <div id="weather">

            <h2 id="city"></h2>

            <p id="temperature"></p>

            <p id="condition"></p>

            <p id="humidity"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
